<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joki Game - Capital Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      body {
        background-color: #0d0d0d;
        color: #d1d5db;
      }
      .text-orange {
        color: #f97316;
      }
      .bg-orange {
        background-color: #f97316;
      }
    </style>
  </head>
  <body class="font-sans antialiased text-slate-300">
    <nav
      class="flex justify-between items-center px-6 py-4 border-b border-orange-500/10 sticky top-0 bg-black/90 backdrop-blur-md z-50"
    >
      <div class="flex items-center gap-2 cursor-pointer group">
        <img
          src="capital.jpeg"
          alt="Logo"
          class="w-8 h-8 rounded-full border border-orange-500/50 group-hover:scale-110 transition"
        />
        <div
          class="text-xl font-black text-orange-500 tracking-tighter uppercase"
        >
          CAPITAL<span class="text-white">STORE</span>
        </div>
      </div>
      <div
        class="hidden md:flex items-center bg-white/5 rounded-full p-1 border border-white/10"
      >
        <a
          href="home.html"
          class="px-6 py-2 rounded-full text-xs font-black uppercase tracking-widest text-slate-400 hover:text-white transition-all"
          >Home</a
        >
        <a
          href="akun.html"
          class="px-6 py-2 rounded-full text-xs font-black uppercase tracking-widest text-slate-400 hover:text-white transition-all"
          >Akun</a
        >
        <a
          href="joki.html"
          class="px-6 py-2 rounded-full text-xs font-black uppercase tracking-widest text-orange-500 bg-orange-500/10 shadow-[0_0_15px_rgba(249,115,22,0.2)]"
          >Joki</a
        >
      </div>
      <button
        class="bg-orange-600 px-6 py-2 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-orange-700 active:scale-90 transition-all"
      >
        Login
      </button>
    </nav>

    <section class="py-16 px-6 container mx-auto">
      <h1 class="text-4xl font-black uppercase mb-2 text-white italic">
        Jasa <span class="text-orange">Joki</span>
      </h1>
      <p class="text-slate-500 mb-10 tracking-widest uppercase text-xs">
        Pilih paket rank atau joki idamanmu
      </p>

      <div class="grid lg:grid-cols-3 gap-8">
        <div
          class="lg:col-span-2 bg-white/5 p-8 rounded-3xl border border-white/10"
        >
          <h2
            class="text-xl font-bold text-white mb-6 uppercase tracking-tighter"
          >
            Form Order
          </h2>
          <form class="space-y-6">
            <div class="grid md:grid-cols-2 gap-6">
              <div class="space-y-2">
                <label class="text-xs font-black uppercase text-slate-500"
                  >Pilih Game</label
                >
                <select
                  class="w-full bg-black border border-white/10 p-3 rounded-xl focus:border-orange-500 outline-none text-white"
                >
                  <option>Mobile Legends</option>
                  <option>Free Fire</option>
                  <option>Valorant</option>
                </select>
              </div>
              <div class="space-y-2">
                <label class="text-xs font-black uppercase text-slate-500"
                  >Pilih Paket</label
                >
                <select
                  class="w-full bg-black border border-white/10 p-3 rounded-xl focus:border-orange-500 outline-none text-white"
                >
                  <option>Per-Bintang (Rp 5.000)</option>
                  <option>Paket Epic ke Mythic</option>
                </select>
              </div>
            </div>
            <div class="space-y-2">
              <label class="text-xs font-black uppercase text-slate-500"
                >ID & Password Akun</label
              >
              <input
                type="text"
                placeholder="Masukkan detail login"
                class="w-full bg-black border border-white/10 p-3 rounded-xl focus:border-orange-500 outline-none text-white"
              />
            </div>
            <button
              class="w-full bg-orange-500 text-black py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-orange-600 active:scale-[0.98] transition-all"
            >
              Pesan Sekarang
            </button>
          </form>
        </div>

        <div class="space-y-6">
          <div
            class="bg-orange-500/10 p-6 rounded-3xl border border-orange-500/20"
          >
            <h3 class="font-black text-orange-500 uppercase mb-3">
              Keamanan Terjamin
            </h3>
            <p class="text-sm leading-relaxed">
              Pro player kami bekerja secara profesional tanpa cheat/pihak
              ketiga. Privasi akun 100% aman.
            </p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
