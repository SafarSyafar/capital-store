<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beli Akun - Capital Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      body {
        background-color: #0d0d0d;
        color: #d1d5db;
      }
      .text-orange {
        color: #f97316;
      }
    </style>
  </head>
  <body class="font-sans antialiased text-slate-300">
    <nav
      class="flex justify-between items-center px-6 py-4 border-b border-orange-500/10 sticky top-0 bg-black/90 backdrop-blur-md z-50"
    >
      <div class="flex items-center gap-2 cursor-pointer group">
        <img
          src="capital.jpeg"
          alt="Logo"
          class="w-8 h-8 rounded-full border border-orange-500/50 group-hover:scale-110 transition"
        />
        <div
          class="text-xl font-black text-orange-500 tracking-tighter uppercase"
        >
          CAPITAL<span class="text-white">STORE</span>
        </div>
      </div>
      <div
        class="hidden md:flex items-center bg-white/5 rounded-full p-1 border border-white/10"
      >
        <a
          href="home.html"
          class="px-6 py-2 rounded-full text-xs font-black uppercase tracking-widest text-slate-400 hover:text-white transition-all"
          >Home</a
        >
        <a
          href="akun.html"
          class="px-6 py-2 rounded-full text-xs font-black uppercase tracking-widest text-orange-500 bg-orange-500/10 shadow-[0_0_15px_rgba(249,115,22,0.2)]"
          >Akun</a
        >
        <a
          href="joki.html"
          class="px-6 py-2 rounded-full text-xs font-black uppercase tracking-widest text-slate-400 hover:text-white transition-all"
          >Joki</a
        >
      </div>
      <button
        class="bg-orange-600 px-6 py-2 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-orange-700 transition-all"
      >
        Login
      </button>
    </nav>

    <section class="py-16 px-6 container mx-auto">
      <div class="flex justify-between items-end mb-12">
        <div>
          <h1 class="text-4xl font-black uppercase text-white italic">
            Katalog <span class="text-orange">Akun</span>
          </h1>
          <p class="text-slate-500 tracking-widest uppercase text-xs">
            Cari akun impianmu di sini
          </p>
        </div>
        <div class="hidden md:block">
          <input
            type="text"
            placeholder="Cari Akun..."
            class="bg-white/5 border border-white/10 px-6 py-2 rounded-full outline-none focus:border-orange-500 text-sm"
          />
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
        <div
          class="bg-[#111111] rounded-3xl overflow-hidden border border-gray-800 group hover:border-orange/60 hover:-translate-y-2 transition-all duration-300"
        >
          <div class="h-48 bg-gray-900 relative">
            <img
              src="https://via.placeholder.com/400x250.png?text=Account+Preview"
              class="w-full h-full object-cover"
            />
            <div
              class="absolute top-3 right-3 bg-black/60 backdrop-blur-md text-[10px] font-bold px-3 py-1 rounded-full text-white border border-white/10"
            >
              MLBB
            </div>
          </div>
          <div class="p-6">
            <h3
              class="font-bold text-white mb-1 line-clamp-1 group-hover:text-orange transition-colors"
            >
              Akun Mythic Immortal
            </h3>
            <p class="text-slate-500 text-[10px] uppercase font-bold mb-4">
              345 Skin | KOF | Collector
            </p>
            <div class="flex justify-between items-center">
              <span class="text-orange font-black text-lg">Rp 1.250k</span>
              <button
                class="bg-white text-black px-4 py-2 rounded-xl font-black text-[10px] uppercase hover:bg-orange hover:text-white transition-all"
              >
                Detail
              </button>
            </div>
          </div>
        </div>

        <div
          class="bg-[#111111] rounded-3xl overflow-hidden border border-gray-800 group hover:border-orange/60 hover:-translate-y-2 transition-all duration-300"
        >
          <div class="h-48 bg-gray-900 relative">
            <img
              src="https://via.placeholder.com/400x250.png?text=Account+Preview"
              class="w-full h-full object-cover"
            />
            <div
              class="absolute top-3 right-3 bg-black/60 backdrop-blur-md text-[10px] font-bold px-3 py-1 rounded-full text-white border border-white/10"
            >
              Free Fire
            </div>
          </div>
          <div class="p-6">
            <h3
              class="font-bold text-white mb-1 line-clamp-1 group-hover:text-orange transition-colors"
            >
              Akun Old Season 1
            </h3>
            <p class="text-slate-500 text-[10px] uppercase font-bold mb-4">
              Bundle HipHop | Sakura
            </p>
            <div class="flex justify-between items-center">
              <span class="text-orange font-black text-lg">Rp 850k</span>
              <button
                class="bg-white text-black px-4 py-2 rounded-xl font-black text-[10px] uppercase hover:bg-orange hover:text-white transition-all"
              >
                Detail
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
